<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="600" cy="315" rx="500" ry="280" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="180" cy="120" rx="250" ry="200" fill="url(#glow2)" filter="url(#blur2)"/>
  <ellipse cx="1020" cy="510" rx="200" ry="180" fill="url(#glow2)" filter="url(#blur2)"/>

  <!-- Dot grid (subtle) -->
  <g opacity="0.12">
    <!-- Row 1 -->
    <circle cx="80" cy="80" r="2" fill="#818cf8"/>
    <circle cx="160" cy="80" r="2" fill="#818cf8"/>
    <circle cx="240" cy="80" r="2" fill="#818cf8"/>
    <circle cx="320" cy="80" r="2" fill="#818cf8"/>
    <circle cx="400" cy="80" r="2" fill="#818cf8"/>
    <!-- Row 2 -->
    <circle cx="80" cy="160" r="2" fill="#818cf8"/>
    <circle cx="160" cy="160" r="2" fill="#818cf8"/>
    <circle cx="240" cy="160" r="2" fill="#818cf8"/>
    <circle cx="320" cy="160" r="2" fill="#818cf8"/>
    <!-- Row 3 -->
    <circle cx="80" cy="240" r="2" fill="#818cf8"/>
    <circle cx="160" cy="240" r="2" fill="#818cf8"/>
    <circle cx="240" cy="240" r="2" fill="#818cf8"/>
    <!-- Right side dots -->
    <circle cx="960" cy="400" r="2" fill="#818cf8"/>
    <circle cx="1040" cy="400" r="2" fill="#818cf8"/>
    <circle cx="1120" cy="400" r="2" fill="#818cf8"/>
    <circle cx="960" cy="480" r="2" fill="#818cf8"/>
    <circle cx="1040" cy="480" r="2" fill="#818cf8"/>
    <circle cx="1120" cy="480" r="2" fill="#818cf8"/>
    <circle cx="960" cy="560" r="2" fill="#818cf8"/>
    <circle cx="1040" cy="560" r="2" fill="#818cf8"/>
    <circle cx="1120" cy="560" r="2" fill="#818cf8"/>
  </g>

  <!-- Decorative agent cards (left) -->
  <g opacity="0.55">
    <!-- Card 1 -->
    <rect x="60" y="240" width="180" height="90" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="76" y="258" width="28" height="28" rx="7" fill="#4f46e5" opacity="0.8"/>
    <text x="90" y="277" font-size="14" text-anchor="middle" fill="white">📧</text>
    <rect x="114" y="263" width="80" height="8" rx="4" fill="#475569"/>
    <rect x="114" y="277" width="56" height="6" rx="3" fill="#334155"/>
    <rect x="76" y="296" width="148" height="6" rx="3" fill="#334155"/>
    <rect x="76" y="308" width="108" height="6" rx="3" fill="#334155"/>

    <!-- Card 2 -->
    <rect x="60" y="350" width="180" height="90" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="76" y="368" width="28" height="28" rx="7" fill="#0891b2" opacity="0.8"/>
    <text x="90" y="387" font-size="14" text-anchor="middle" fill="white">🏠</text>
    <rect x="114" y="373" width="72" height="8" rx="4" fill="#475569"/>
    <rect x="114" y="387" width="88" height="6" rx="3" fill="#334155"/>
    <rect x="76" y="406" width="148" height="6" rx="3" fill="#334155"/>
    <rect x="76" y="418" width="90" height="6" rx="3" fill="#334155"/>

    <!-- Card 3 (partial, fading top) -->
    <rect x="60" y="456" width="180" height="90" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="76" y="474" width="28" height="28" rx="7" fill="#059669" opacity="0.8"/>
    <text x="90" y="493" font-size="14" text-anchor="middle" fill="white">💼</text>
    <rect x="114" y="479" width="96" height="8" rx="4" fill="#475569"/>
    <rect x="114" y="493" width="64" height="6" rx="3" fill="#334155"/>
  </g>

  <!-- Decorative agent cards (right) -->
  <g opacity="0.45">
    <!-- Card right 1 -->
    <rect x="960" y="80" width="180" height="90" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="976" y="98" width="28" height="28" rx="7" fill="#7c3aed" opacity="0.8"/>
    <text x="990" y="117" font-size="14" text-anchor="middle" fill="white">🤖</text>
    <rect x="1014" y="103" width="100" height="8" rx="4" fill="#475569"/>
    <rect x="1014" y="117" width="70" height="6" rx="3" fill="#334155"/>
    <rect x="976" y="136" width="148" height="6" rx="3" fill="#334155"/>
    <rect x="976" y="148" width="120" height="6" rx="3" fill="#334155"/>

    <!-- Card right 2 -->
    <rect x="960" y="190" width="180" height="90" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="976" y="208" width="28" height="28" rx="7" fill="#dc2626" opacity="0.8"/>
    <text x="990" y="227" font-size="14" text-anchor="middle" fill="white">📊</text>
    <rect x="1014" y="213" width="85" height="8" rx="4" fill="#475569"/>
    <rect x="1014" y="227" width="110" height="6" rx="3" fill="#334155"/>
    <rect x="976" y="246" width="148" height="6" rx="3" fill="#334155"/>
    <rect x="976" y="258" width="80" height="6" rx="3" fill="#334155"/>
  </g>

  <!-- Connecting lines (subtle) -->
  <g opacity="0.08" stroke="#818cf8" stroke-width="1" fill="none">
    <line x1="240" y1="300" x2="410" y2="315"/>
    <line x1="960" y1="230" x2="790" y2="315"/>
  </g>

  <!-- Center logo badge -->
  <rect x="549" y="155" width="102" height="102" rx="24" fill="#4f46e5"/>
  <rect x="553" y="159" width="94" height="94" rx="22" fill="#6366f1" opacity="0.4"/>
  <!-- Lightning bolt SVG path -->
  <text x="600" y="226" font-size="52" text-anchor="middle" dominant-baseline="middle" fill="white">⚡</text>

  <!-- AgentFlow wordmark -->
  <text
    x="600" y="320"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="76"
    font-weight="900"
    letter-spacing="-3"
    text-anchor="middle"
    fill="white"
  >AgentFlow</text>

  <!-- Tagline -->
  <text
    x="600" y="372"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="26"
    font-weight="400"
    text-anchor="middle"
    fill="#94a3b8"
    letter-spacing="-0.5"
  >La marketplace d&apos;agents IA spécialisés</text>

  <!-- Feature pills -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">
    <!-- Pill 1 -->
    <rect x="338" y="410" width="130" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="403" y="432" text-anchor="middle" fill="#818cf8">Email automatisé</text>
    <!-- Pill 2 -->
    <rect x="485" y="410" width="110" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="540" y="432" text-anchor="middle" fill="#818cf8">Recrutement IA</text>
    <!-- Pill 3 -->
    <rect x="612" y="410" width="100" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="662" y="432" text-anchor="middle" fill="#818cf8">Immobilier IA</text>
    <!-- Pill 4 -->
    <rect x="729" y="410" width="130" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="794" y="432" text-anchor="middle" fill="#818cf8">Dev &amp; sécurité</text>
  </g>

  <!-- Divider line -->
  <line x1="400" y1="490" x2="800" y2="490" stroke="#1e293b" stroke-width="1"/>

  <!-- Bottom stats -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" text-anchor="middle">
    <text x="440" y="528" font-size="22" font-weight="800" fill="white">19+</text>
    <text x="440" y="548" font-size="13" fill="#64748b">agents spécialisés</text>

    <text x="600" y="528" font-size="22" font-weight="800" fill="white">Gratuit</text>
    <text x="600" y="548" font-size="13" fill="#64748b">pour démarrer</text>

    <text x="760" y="528" font-size="22" font-weight="800" fill="white">&lt; 2s</text>
    <text x="760" y="548" font-size="13" fill="#64748b">temps de réponse</text>
  </g>

  <!-- URL badge -->
  <rect x="480" y="570" width="240" height="36" rx="18" fill="#1e293b" stroke="#4f46e5" stroke-width="1.5"/>
  <text
    x="600" y="593"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="16"
    font-weight="700"
    text-anchor="middle"
    fill="#818cf8"
    letter-spacing="0.5"
  >agentflow.io</text>
</svg>
